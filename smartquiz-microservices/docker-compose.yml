version: "3.9"

services:

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  auth-service:
    build: ./auth-service
    ports:
      - "8000:8000"

  question-service:
    build: ./question-service
    ports:
      - "8001:8001"

  quiz-service:
    build: ./quiz-service
    ports:
      - "8002:8002"
    depends_on:
      - redis

  result-service:
    build: ./result-service
    ports:
      - "8003:8003"

  ai-service:
    build: ./ai-service
    ports:
      - "8004:8004"